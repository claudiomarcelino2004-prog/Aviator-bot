<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AVIATOR PRO — Sinais em Tempo Real</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --g1:#00FF41;--g2:#00E676;--g3:#00C853;
  --gold:#FFD700;--red:#FF1744;--orange:#FF6D00;--cyan:#00BCD4;
  --border:rgba(0,255,65,0.2);--border2:rgba(0,255,65,0.5);
  --text:#E0FFE8;--muted:#4A7A55;
  --dark:#000;--dark2:#020802;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* HEADER */
.top-bar{background:rgba(0,0,0,.97);border-bottom:1px solid var(--border);padding:0 12px;height:44px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;}
.logo{display:flex;align-items:center;gap:6px;font-family:'Orbitron',monospace;font-weight:900;font-size:.78rem;color:var(--g1);}
.logo-ic{width:28px;height:28px;background:linear-gradient(135deg,#00C853,#00FF41);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.9rem;box-shadow:0 0 10px rgba(0,255,65,.4);}
.top-right{display:flex;align-items:center;gap:8px;}
.badge-live{display:flex;align-items:center;gap:3px;background:rgba(0,255,65,.07);border:1px solid rgba(0,255,65,.3);padding:3px 8px;border-radius:50px;font-size:.6rem;font-weight:700;color:var(--g2);}
.dot{width:4px;height:4px;border-radius:50%;background:var(--g2);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.btn-toggle{background:rgba(0,255,65,.08);border:1px solid var(--border);border-radius:8px;color:var(--g2);font-size:.65rem;font-weight:700;padding:4px 8px;cursor:pointer;font-family:'Orbitron',monospace;}

/* GAME FRAME */
.game-container{flex:1;position:relative;overflow:hidden;}
.game-frame{width:100%;height:100%;border:none;display:block;}
.frame-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.9);z-index:10;flex-direction:column;gap:16px;padding:20px;text-align:center;}
.frame-overlay.hidden{display:none;}
.fo-logo{font-size:2.5rem;margin-bottom:8px;}
.fo-title{font-family:'Orbitron',monospace;font-size:1rem;font-weight:900;color:var(--g1);margin-bottom:6px;}
.fo-desc{font-size:.8rem;color:var(--muted);line-height:1.7;margin-bottom:16px;}
.btn-enter{background:linear-gradient(135deg,#00C853,#00FF41);border:none;border-radius:12px;color:#000;font-family:'Orbitron',monospace;font-size:.82rem;font-weight:900;padding:14px 28px;cursor:pointer;letter-spacing:1.5px;box-shadow:0 4px 20px rgba(0,255,65,.4);}

/* SIGNAL PANEL */
.signal-panel{background:rgba(0,0,0,.97);border-top:2px solid var(--border2);flex-shrink:0;transition:height .3s ease;overflow:hidden;}
.signal-panel.expanded{height:280px;}
.signal-panel.collapsed{height:52px;}

/* PANEL HEADER */
.panel-header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;cursor:pointer;border-bottom:1px solid rgba(0,255,65,.08);}
.ph-left{display:flex;align-items:center;gap:10px;}
.ph-signal{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;color:var(--g1);text-shadow:0 0 10px rgba(0,255,65,.4);}
.ph-signal.idle{color:rgba(0,255,65,.3);}
.ph-signal.loading{animation:blink .4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.ph-badges{display:flex;gap:5px;align-items:center;}
.ph-badge{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:50px;}
.ph-badge.conf{background:rgba(0,255,65,.1);border:1px solid rgba(0,255,65,.25);color:var(--g1);}
.ph-badge.prot{background:rgba(255,109,0,.08);border:1px solid rgba(255,109,0,.2);color:var(--orange);}
.ph-badge.real{background:rgba(0,188,212,.08);border:1px solid rgba(0,188,212,.2);color:var(--cyan);font-size:.55rem;}
.ph-right{display:flex;align-items:center;gap:8px;}
.ph-arrow{color:var(--muted);font-size:.8rem;transition:transform .3s;}
.ph-arrow.up{transform:rotate(180deg);}

/* PANEL BODY */
.panel-body{padding:10px 14px 14px;height:228px;overflow-y:auto;}

/* AP GRID */
.ap-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.ap-card{border-radius:11px;padding:10px 8px;text-align:center;position:relative;overflow:hidden;}
.ap-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;}
.ap-card.alvo{background:rgba(0,255,65,.06);border:1px solid rgba(0,255,65,.3);}
.ap-card.alvo::before{background:linear-gradient(90deg,transparent,#00FF41,transparent);}
.ap-card.prot{background:rgba(255,109,0,.05);border:1px solid rgba(255,109,0,.2);}
.ap-card.prot::before{background:linear-gradient(90deg,transparent,#FF6D00,transparent);}
.ap-card.hor{background:rgba(0,188,212,.05);border:1px solid rgba(0,188,212,.2);}
.ap-card.hor::before{background:linear-gradient(90deg,transparent,#00BCD4,transparent);}
.ap-lbl{font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:4px;}
.ap-card.alvo .ap-lbl{color:rgba(0,255,65,.5);}
.ap-card.prot .ap-lbl{color:rgba(255,109,0,.5);}
.ap-card.hor .ap-lbl{color:rgba(0,188,212,.5);}
.ap-val{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;line-height:1;}
.ap-card.alvo .ap-val{color:var(--g1);}
.ap-card.prot .ap-val{color:var(--orange);}
.ap-card.hor .ap-val{color:var(--cyan);font-size:.85rem;}

/* CONFIANÇA */
.conf-wrap{margin-bottom:10px;}
.conf-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.conf-label{font-size:.6rem;color:rgba(0,255,65,.4);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
.conf-pct{font-family:'Orbitron',monospace;font-size:.88rem;font-weight:900;color:var(--g1);}
.conf-bar{height:5px;background:rgba(255,255,255,.05);border-radius:50px;overflow:hidden;}
.conf-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#FF6D00,#FFD700,#00FF41);transition:width .5s ease;}

/* PADROES */
.pad-wrap{background:rgba(0,0,0,.4);border:1px solid rgba(0,255,65,.08);border-radius:9px;padding:8px 10px;margin-bottom:10px;}
.pad-title{font-size:.56rem;color:rgba(0,255,65,.4);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:6px;}
.pad-item{font-size:.74rem;color:var(--g2);display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.pad-item:last-child{margin-bottom:0;}

/* GENERATE BUTTON */
.btn-gen{
  width:100%;
  background:linear-gradient(135deg,#00C853,#00FF41);
  border:none;border-radius:11px;color:#000;
  font-family:'Orbitron',monospace;font-size:.82rem;font-weight:900;
  padding:13px;cursor:pointer;letter-spacing:1.5px;
  box-shadow:0 3px 16px rgba(0,255,65,.35);
  display:flex;align-items:center;justify-content:center;gap:6px;
  position:relative;overflow:hidden;transition:all .2s;
}
.btn-gen::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:sweep 2s infinite;}
@keyframes sweep{0%{left:-100%;}100%{left:100%;}}
.btn-gen:disabled{opacity:.5;cursor:not-allowed;}
.btn-gen:disabled::before{display:none;}
.btn-spin{width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

/* STATS ROW */
.stats-mini{display:flex;gap:5px;margin-bottom:10px;}
.sm{background:rgba(0,255,65,.04);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center;flex:1;}
.sm-n{font-family:'Orbitron',monospace;font-size:.72rem;font-weight:900;color:var(--g1);}
.sm-l{font-size:.52rem;color:var(--muted);text-transform:uppercase;margin-top:1px;}

/* PROG */
.prog-wrap{display:none;margin-bottom:8px;}
.prog-wrap.show{display:block;}
.prog-outer{height:3px;background:rgba(255,255,255,.04);border-radius:50px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#00C853,#00FF41);border-radius:50px;width:0%;transition:width .08s;animation:pgm 2s linear infinite;}
@keyframes pgm{0%{background-position:0%;}100%{background-position:200%;}}
.prog-phase{font-size:.58rem;color:var(--g2);margin-top:3px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="logo">
    <div class="logo-ic">✈</div>
    AVIATOR <span style="color:#fff;margin-left:2px;">PRO</span>
  </div>
  <div class="top-right">
    <div class="badge-live"><div class="dot"></div> LIVE</div>
    <button class="btn-toggle" onclick="toggleGame()">🎮 JOGO</button>
  </div>
</div>

<!-- GAME CONTAINER -->
<div class="game-container" id="gameContainer">
  <!-- OVERLAY inicial -->
  <div class="frame-overlay" id="frameOverlay">
    <div class="fo-logo">✈️</div>
    <div class="fo-title">AVIATOR PRO</div>
    <div class="fo-desc">Clica para abrir o Aviator da MolaBet com sinais em tempo real sobrepostos!</div>
    <button class="btn-enter" onclick="loadGame()">🚀 ABRIR JOGO + SINAIS</button>
  </div>
  <!-- IFRAME do jogo -->
  <iframe
    id="gameFrame"
    class="game-frame"
    src="about:blank"
    allow="fullscreen"
    allowfullscreen
  ></iframe>
</div>

<!-- SIGNAL PANEL -->
<div class="signal-panel expanded" id="signalPanel">

  <!-- PANEL HEADER -->
  <div class="panel-header" onclick="togglePanel()">
    <div class="ph-left">
      <div class="ph-signal idle" id="phSignal">--.-×</div>
      <div class="ph-badges">
        <div class="ph-badge conf" id="phConf" style="display:none"></div>
        <div class="ph-badge prot" id="phProt" style="display:none"></div>
        <div class="ph-badge real" id="phReal" style="display:none">✅ DADOS REAIS</div>
      </div>
    </div>
    <div class="ph-right">
      <span style="font-size:.6rem;color:var(--muted);">SINAIS</span>
      <span class="ph-arrow up" id="phArrow">▼</span>
    </div>
  </div>

  <!-- PANEL BODY -->
  <div class="panel-body" id="panelBody">

    <!-- STATS MINI -->
    <div class="stats-mini">
      <div class="sm"><div class="sm-n">49.5%</div><div class="sm-l">Abaixo 2×</div></div>
      <div class="sm"><div class="sm-n">78.6%</div><div class="sm-l">Abaixo 5×</div></div>
      <div class="sm"><div class="sm-n">6.11×</div><div class="sm-l">Média Real</div></div>
      <div class="sm"><div class="sm-n">1M+</div><div class="sm-l">Rodadas</div></div>
    </div>

    <!-- PROGRESS -->
    <div class="prog-wrap" id="progWrap">
      <div class="prog-outer"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-phase" id="progPhase">A processar...</div>
    </div>

    <!-- AP GRID -->
    <div class="ap-grid" id="apGrid" style="display:none;">
      <div class="ap-card alvo">
        <div class="ap-lbl">🎯 Alvo</div>
        <div class="ap-val" id="apAlvo">—</div>
      </div>
      <div class="ap-card prot">
        <div class="ap-lbl">🛡️ Proteção</div>
        <div class="ap-val" id="apProt">—</div>
      </div>
      <div class="ap-card hor">
        <div class="ap-lbl">⏰ Hora</div>
        <div class="ap-val" id="apHor">—</div>
      </div>
    </div>

    <!-- CONFIANÇA -->
    <div class="conf-wrap" id="confWrap" style="display:none;">
      <div class="conf-head">
        <span class="conf-label">Índice de Confiança</span>
        <span class="conf-pct" id="confPct">0%</span>
      </div>
      <div class="conf-bar"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
    </div>

    <!-- PADROES -->
    <div class="pad-wrap" id="padWrap" style="display:none;">
      <div class="pad-title">Padrões Detectados</div>
      <div id="padList"></div>
    </div>

    <!-- GENERATE BUTTON -->
    <button class="btn-gen" id="genBtn" onclick="generateSignal()">
      <div class="btn-spin" id="genSpin"></div>
      <span id="genTxt">⚡ GERAR SINAL</span>
    </button>

  </div>
</div>

<script>
const API_URL = 'https://aviator-api-sdeq.onrender.com';
let panelExpanded = true;
let generating = false;

/* TOGGLE PANEL */
function togglePanel(){
  panelExpanded = !panelExpanded;
  const panel = document.getElementById('signalPanel');
  const arrow = document.getElementById('phArrow');
  panel.className = 'signal-panel ' + (panelExpanded ? 'expanded' : 'collapsed');
  arrow.className = 'ph-arrow ' + (panelExpanded ? 'up' : '');
}

/* TOGGLE GAME */
function toggleGame(){
  const gc = document.getElementById('gameContainer');
  gc.style.display = gc.style.display === 'none' ? 'flex' : 'none';
}

/* LOAD GAME */
function loadGame(){
  document.getElementById('frameOverlay').classList.add('hidden');
  document.getElementById('gameFrame').src = 'https://molabet.online/aviator';
}

/* GENERATE SIGNAL */
async function generateSignal(){
  if(generating) return;
  generating = true;

  const btn = document.getElementById('genBtn');
  const spin = document.getElementById('genSpin');
  const txt = document.getElementById('genTxt');
  const phSignal = document.getElementById('phSignal');
  const progWrap = document.getElementById('progWrap');
  const progFill = document.getElementById('progFill');
  const progPhase = document.getElementById('progPhase');

  btn.disabled = true;
  spin.style.display = 'block';
  txt.textContent = 'A CALCULAR...';
  phSignal.className = 'ph-signal loading';
  phSignal.textContent = '...';
  progWrap.classList.add('show');

  // Esconder resultados
  document.getElementById('apGrid').style.display = 'none';
  document.getElementById('confWrap').style.display = 'none';
  document.getElementById('padWrap').style.display = 'none';
  document.getElementById('phConf').style.display = 'none';
  document.getElementById('phProt').style.display = 'none';
  document.getElementById('phReal').style.display = 'none';

  const phases = ['Analisando 1M+ rodadas...','Calculando probabilidades...','Validando padrões...','Sinal pronto!'];
  let prog = 0, phIdx = 0;
  progPhase.textContent = phases[0];

  const progInt = setInterval(()=>{
    prog += Math.random()*4+1;
    if(prog>99) prog=99;
    progFill.style.width = prog+'%';
    phIdx = Math.min(Math.floor(prog/25), phases.length-1);
    progPhase.textContent = phases[phIdx];
  }, 80);

  // Expandir painel se colapsado
  if(!panelExpanded) togglePanel();

  setTimeout(async()=>{
    clearInterval(progInt);
    progFill.style.width = '100%';
    progPhase.textContent = 'CONCLUÍDO ✅';

    const signal = await getSignal();

    // Actualizar header
    phSignal.className = 'ph-signal';
    phSignal.textContent = signal.value + '×';
    phSignal.style.color = '#00FF41';

    const phConf = document.getElementById('phConf');
    phConf.textContent = signal.conf + '% conf.';
    phConf.style.display = 'block';

    const phProt = document.getElementById('phProt');
    phProt.textContent = '🛡️ ' + signal.protecao + '×';
    phProt.style.display = 'block';

    if(signal.dados_reais){
      document.getElementById('phReal').style.display = 'block';
    }

    // AP Grid
    document.getElementById('apGrid').style.display = 'grid';
    document.getElementById('apAlvo').textContent = signal.value + '×';
    document.getElementById('apProt').textContent = signal.protecao + '×';
    document.getElementById('apHor').textContent = signal.horario;

    // Confiança
    document.getElementById('confWrap').style.display = 'block';
    document.getElementById('confPct').textContent = signal.conf + '%';
    setTimeout(()=>{
      document.getElementById('confFill').style.width = signal.conf + '%';
    }, 100);

    // Padrões
    document.getElementById('padWrap').style.display = 'block';
    const pads = signal.padroes || [`Alvo: ${signal.value}×`, `Proteção: ${signal.protecao}×`, `Confiança: ${signal.conf}%`];
    document.getElementById('padList').innerHTML = pads.map(p=>`<div class="pad-item">⬡ ${p}</div>`).join('');

    progWrap.classList.remove('show');
    btn.disabled = false;
    spin.style.display = 'none';
    txt.textContent = '⚡ NOVO SINAL';
    generating = false;
  }, 3500);
}

async function getSignal(){
  try{
    const res = await fetch(`${API_URL}/api/sinal`);
    const data = await res.json();
    if(data.status === 'sucesso'){
      return {
        value: data.sinal.toFixed(2),
        conf: data.confianca,
        protecao: data.protecao.toFixed(2),
        horario: data.horario,
        padroes: data.padroes,
        dados_reais: true
      };
    }
  }catch(e){}
  // Fallback baseado em estatísticas reais
  const r = Math.random();
  let val;
  if(r<0.495) val=(1.1+Math.random()*0.89).toFixed(2);
  else if(r<0.786) val=(2+Math.random()*2.99).toFixed(2);
  else if(r<0.883) val=(5+Math.random()*4.99).toFixed(2);
  else val=(10+Math.random()*40).toFixed(2);
  const conf = Math.floor(65+Math.random()*28);
  const protecao = (parseFloat(val)*(0.65+Math.random()*0.15)).toFixed(2);
  const now = new Date();
  now.setSeconds(now.getSeconds()+Math.floor(20+Math.random()*40));
  const horario = now.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  return {value:val, conf, protecao, horario, dados_reais:false};
}
</script>
</body>
</html>
